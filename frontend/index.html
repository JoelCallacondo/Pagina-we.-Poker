<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Poker Online</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="poker-app">
        <section class="table-area">
            <div class="table-ring"></div>

            <div id="players"></div>

            <div class="center-panel">
                <h1 id="pot">Pozo S/0.00</h1>
                <p id="phase">Esperando mesa...</p>
                <h2 id="current-bet">Apuesta actual S/0.00</h2>

                <div id="community-cards" class="community-cards"></div>

                <div class="actions">
                    <button onclick="sendAction('check')">Pasar</button>
                    <button onclick="sendAction('call')">Igualar</button>
                    <button onclick="sendAction('bet')">Apostar</button>
                    <button onclick="sendAction('fold')">Retirarse</button>
                </div>

                <p id="status">Conectando...</p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
